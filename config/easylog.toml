# EasyLog configuration
#
# Copy/edit this file; EasyLog loads config/easylog.toml by default
# (override with the EASYLOG_CONFIG environment variable).

# Address the syslog listeners (UDP + TCP) bind to.
syslog_bind = "0.0.0.0"

# Syslog port. 514 is standard but requires privileges to bind (<1024).
# For local testing without root, set this to e.g. 5514.
syslog_port = 514

# Port for the web UI / dashboards.
web_port = 3000

# DuckDB database file.
db_path = "easylog.duckdb"

# DuckDB memory cap (DuckDB defaults to ~80% of RAM). Raise for heavy queries
# over large tables; set "" to use DuckDB's default. Threads: 0 = one per core.
duckdb_memory_limit = "256MB"
duckdb_threads = 2

# Log sources (which sending host maps to which log type) are managed in the
# database via the web UI at http://<host>:<web_port>/sources — not here.
