# EasyLog configuration (system package default).
#
# Installed to /etc/easylog/easylog.toml and referenced by the systemd unit via
# EASYLOG_CONFIG. Templates and static assets are read relative to the service
# WorkingDirectory (/usr/share/easylog); the database lives under /var/lib.

# Address the syslog listeners (UDP + TCP) bind to.
syslog_bind = "0.0.0.0"

# Standard syslog port. The systemd unit grants CAP_NET_BIND_SERVICE so the
# service may bind it without running as root. Change to e.g. 5514 if preferred.
syslog_port = 514

# Port for the web UI / dashboards.
web_port = 3000

# DuckDB database file. /var/lib/easylog is created by the unit's StateDirectory.
db_path = "/var/lib/easylog/easylog.duckdb"

# DuckDB memory cap. DuckDB defaults to ~80% of system RAM and holds onto it, so
# this keeps EasyLog lightweight. Raise it (e.g. "1GB") if you run heavy queries
# over very large tables; set "" to use DuckDB's default.
duckdb_memory_limit = "256MB"

# DuckDB worker threads (0 = one per CPU core).
duckdb_threads = 2
