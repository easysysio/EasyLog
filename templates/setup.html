<!DOCTYPE html>
{# setup.html — standalone first-run admin creation page (no navbar). #}
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — EasyLog</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="card shadow-sm" style="width:380px">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-1">
        <i class="bi bi-stack text-primary"></i> Easy<span class="text-primary">Log</span>
      </h1>
      <p class="text-secondary text-center small mb-4">Create the admin account to get started.</p>
      {% if error %}
      <div class="alert alert-danger py-2 small d-flex align-items-center">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>
      {% endif %}
      <form method="post" action="/setup">
        <label class="form-label small text-secondary">Admin username</label>
        <input name="username" class="form-control mb-3" placeholder="admin" required autofocus autocomplete="username">
        <label class="form-label small text-secondary">Password <span class="text-secondary">(min 8 chars)</span></label>
        <input name="password" type="password" class="form-control mb-3" required autocomplete="new-password">
        <label class="form-label small text-secondary">Confirm password</label>
        <input name="confirm" type="password" class="form-control mb-3" required autocomplete="new-password">
        <button class="btn btn-primary w-100" type="submit">Create admin &amp; sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
