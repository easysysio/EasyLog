# Release pipeline: on a v* tag, build .deb + .rpm for x86_64 and arm64 (native
# runners — avoids cross-compiling the bundled DuckDB C++), then publish a
# GitHub Release whose body is the matching CHANGELOG section, with the packages
# attached.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} packages
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/easylog

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Collect packages
        run: |
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: EasyLog ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: dist/*
          fail_on_unmatched_files: true
